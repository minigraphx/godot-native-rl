name: CI

# Builds the native GDExtension (godot-cpp + statically-linked ncnn) once, then runs the full
# headless test suite (test/run_tests.sh) under both supported Godot versions.
#
# Why the extension is built only once: a GDExtension built against godot-cpp 4.5 is
# forward-compatible, so the same bin/ runs under both Godot 4.5 and 4.6 — we test the one
# artifact on both engines instead of rebuilding per version.
#
# The SampleFactory smoke (run_tests.sh) auto-skips when .venv-sf is absent; CI intentionally
# does NOT install .venv-sf (heavy deps + an in-CI socket training run would be slow/flaky).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One in-flight run per branch/PR; newer pushes cancel older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned dependency refs — also the cache keys. Bump CACHE_VERSION to force a cold rebuild.
  GODOT_CPP_BRANCH: "4.5"   # build against the minimum supported Godot; runs on newer too
  NCNN_TAG: "20260526"      # matches the locally-vendored ncnn (docs/dev/building.md)
  CACHE_VERSION: "v1"
  # Cap CMake build parallelism. ncnn's SIMD/INT8 translation units are memory-heavy; compiling
  # at full -j(nproc) (4 on the standard runner) OOM-kills cc1plus on the 16 GB runner. 2 stays
  # well under the limit. Governs both our `cmake --build` and build_ncnn_tools.sh's `--parallel`.
  CMAKE_BUILD_PARALLEL_LEVEL: "2"

jobs:
  build:
    name: Build extension (linux x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git

      # The cache must carry the PREBUILT libs (bin/libgodot-cpp.*.a) + the checkout itself:
      # on warm runs the clone step is skipped, and the root build links these libs directly via
      # build_library=no (see Build GDExtension) instead of recompiling the bindings (#85).
      # Intermediate objects and godot-cpp's own .sconsign are excluded — nothing reads them once
      # the libs exist, and dropping them keeps the cache small and fast to restore.
      # Key is rotated ("-lib") so the pre-#85 cache (which predates this layout) can't be hit.
      - name: Cache godot-cpp (checkout + prebuilt lib)
        id: cache-godot-cpp
        uses: actions/cache@v5
        with:
          path: |
            godot-cpp
            !godot-cpp/**/*.o
            !godot-cpp/**/*.os
            !godot-cpp/.sconsign.dblite
          key: godot-cpp-lib-${{ runner.os }}-${{ env.GODOT_CPP_BRANCH }}-${{ env.CACHE_VERSION }}

      - name: Build godot-cpp bindings
        if: steps.cache-godot-cpp.outputs.cache-hit != 'true'
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          scons -C godot-cpp platform=linux target=template_debug -j"$(nproc)"
          scons -C godot-cpp platform=linux target=template_release -j"$(nproc)"

      - name: Cache ncnn (static lib + INT8 tools)
        id: cache-ncnn
        uses: actions/cache@v5
        with:
          path: thirdparty/ncnn
          key: ncnn-${{ runner.os }}-${{ env.NCNN_TAG }}-${{ env.CACHE_VERSION }}

      - name: Build ncnn static lib + INT8 tools
        if: steps.cache-ncnn.outputs.cache-hit != 'true'
        run: |
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn
          # ONE capped build produces both the static lib (for the extension link) AND the INT8
          # CLI tools. NOTE: we do NOT run scripts/build_ncnn_tools.sh here — it calls
          # `cmake --build --parallel` with no job count, which makes Make run UNLIMITED jobs
          # (CMAKE_BUILD_PARALLEL_LEVEL is ignored when --parallel is given) and OOM-kills cc1plus
          # on ncnn's AVX512 TUs. Building once with TOOLS=ON + a capped `cmake --build` (no
          # --parallel flag → honours CMAKE_BUILD_PARALLEL_LEVEL) avoids the second build entirely.
          cmake -S thirdparty/ncnn -B thirdparty/ncnn/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNCNN_BUILD_TOOLS=ON \
            -DNCNN_BUILD_EXAMPLES=OFF \
            -DNCNN_BUILD_BENCHMARK=OFF \
            -DNCNN_BUILD_TESTS=OFF \
            -DNCNN_SIMPLEOCV=ON \
            -DNCNN_INT8=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build thirdparty/ncnn/build --config Release   # parallelism via CMAKE_BUILD_PARALLEL_LEVEL
          cmake --install thirdparty/ncnn/build --prefix thirdparty/ncnn/build/install
          # Collect the three quantize tools into tools-bin/ (same layout build_ncnn_tools.sh
          # produces) so run_tests.sh's invocation finds them and short-circuits — no rebuild.
          mkdir -p thirdparty/ncnn/tools-bin
          for tool in ncnn2table ncnn2int8 ncnnoptimize; do
            src="$(find thirdparty/ncnn/build -type f -name "$tool" -perm -u+x | head -n1)"
            if [ -z "$src" ]; then echo "ERROR: built tool not found: $tool" >&2; exit 1; fi
            cp -f "$src" "thirdparty/ncnn/tools-bin/$tool"
          done

      # Content-addressed cache of the linked extension binaries. The key covers EVERY input the
      # binary depends on, so a hit means the bytes would be identical to a fresh build:
      #   - hashFiles('src/**', 'SConstruct')  → extension sources/headers (CPPPATH=["src"]) + build script
      #   - GODOT_CPP_BRANCH                    → godot-cpp bindings it links against
      #   - NCNN_TAG                            → vendored ncnn static lib it links against
      #   - runner.os                           → toolchain/runner image family
      #   - CACHE_VERSION                       → manual invalidation escape hatch (bump to force a cold rebuild)
      # On a hit the Build GDExtension step is skipped; the bin/ is restored and still uploaded
      # below, so the test matrix is unaffected. A src/ or SConstruct edit changes the hash and
      # rebuilds; a GODOT_CPP_BRANCH/NCNN_TAG bump rotates the key (and also busts the dep caches).
      # (Validated on #99: cold run built + populated the cache; a no-C++ follow-up hit it and
      # skipped the scons compile while the test matrix stayed green.)
      - name: Cache extension binaries
        id: cache-bin
        uses: actions/cache@v5
        with:
          path: addons/godot_native_rl/bin
          key: bin-${{ runner.os }}-gcpp${{ env.GODOT_CPP_BRANCH }}-ncnn${{ env.NCNN_TAG }}-${{ env.CACHE_VERSION }}-${{ hashFiles('src/**', 'SConstruct') }}

      # build_library=no (godot-cpp's own option) makes the included godot-cpp/SConstruct skip
      # compiling the bindings and just link the prebuilt bin/libgodot-cpp.*.a from the step/cache
      # above. Without it, the root scons recompiles all of godot-cpp (~15 min) because its
      # signature DB (.sconsign) is separate from the `scons -C godot-cpp` build's (#85). The
      # bindings *generator* still re-runs (~1 min, idempotent) — only the recompile is skipped.
      - name: Build GDExtension
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          scons platform=linux target=template_debug build_library=no -j"$(nproc)"
          scons platform=linux target=template_release build_library=no -j"$(nproc)"

      - name: Upload extension binaries
        uses: actions/upload-artifact@v7
        with:
          name: extension-bin
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  test:
    name: Test (Godot ${{ matrix.godot.version }})
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        godot:
          - { version: "4.5.2-stable", file: "Godot_v4.5.2-stable_linux.x86_64" }
          - { version: "4.6.3-stable", file: "Godot_v4.6.3-stable_linux.x86_64" }
    steps:
      - uses: actions/checkout@v6

      - name: Install runtime toolchain
        # cmake/build-essential only needed if the ncnn-tools cache is cold; build_ncnn_tools.sh
        # is idempotent and short-circuits when tools-bin/ is restored from cache.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake unzip curl

      - name: Download extension binaries
        uses: actions/download-artifact@v8
        with:
          name: extension-bin
          path: addons/godot_native_rl/bin/

      - name: Restore ncnn cache (source + INT8 tools)
        uses: actions/cache/restore@v5
        with:
          path: thirdparty/ncnn
          key: ncnn-${{ runner.os }}-${{ env.NCNN_TAG }}-${{ env.CACHE_VERSION }}
          fail-on-cache-miss: true

      # .venv-train runs on 3.12 (matches the validated wheel set: numpy 2.4.6 + onnx 1.21 + SB3
      # 2.8.0 + gymnasium 1.2.2, all available as 3.12 wheels so nothing builds from source).
      - name: Set up Python 3.12 (.venv-train)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python 3.14 (.venv convert)
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache Python venvs
        id: cache-venvs
        uses: actions/cache@v5
        with:
          path: |
            .venv
            .venv-train
          key: venvs-${{ runner.os }}-py314-py312-${{ hashFiles('requirements-convert.txt', 'requirements-train.txt', '.github/ci-constraints.txt') }}-${{ env.CACHE_VERSION }}

      - name: Create venvs
        if: steps.cache-venvs.outputs.cache-hit != 'true'
        run: |
          # Install CPU-only torch FIRST in each venv. The default PyPI torch bundles multi-GB CUDA
          # libs (cuda_bindings, nvidia-nvshmem, ...) and pulling it into BOTH venvs fills the
          # runner's ~14 GB disk ([Errno 28] No space left). CI is CPU-only, so the CPU wheel is
          # both correct and ~20x smaller; pre-installing it satisfies the `torch` dep so the
          # subsequent requirements install never reaches for the CUDA build.
          TORCH_CPU_INDEX="https://download.pytorch.org/whl/cpu"
          # Convert venv (3.14): no constraints — pnnx + torch only, numpy resolves to 2.x cleanly.
          python3.14 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --index-url "$TORCH_CPU_INDEX" torch
          .venv/bin/pip install -r requirements-convert.txt
          # Train venv (3.12): -c freezes numpy 2.4.6 + onnx 1.21 (issue #126 retired the old
          # numpy<2/ml_dtypes hack). godot-rl is installed --no-deps (its SB3<=2.4.0 / gymnasium
          # <=1.0.0 caps conflict with the SB3 2.8.0 / gymnasium 1.2.2 stack; runtime-compatible).
          # CI omits the ray add-on (requirements-rllib.txt) to keep the cached venv small — the
          # RLlib smoke in run_tests.sh skips when ray is absent.
          python3.12 -m venv .venv-train
          .venv-train/bin/pip install --upgrade pip
          .venv-train/bin/pip install --index-url "$TORCH_CPU_INDEX" torch
          .venv-train/bin/pip install -c .github/ci-constraints.txt -r requirements-train.txt
          .venv-train/bin/pip install --no-deps "godot-rl==0.8.2"

      - name: Download Godot ${{ matrix.godot.version }} (headless)
        run: |
          url="https://github.com/godotengine/godot/releases/download/${{ matrix.godot.version }}/${{ matrix.godot.file }}.zip"
          curl -fL "$url" -o godot.zip
          unzip -q godot.zip
          chmod +x "${{ matrix.godot.file }}"
          echo "GODOT=$PWD/${{ matrix.godot.file }}" >> "$GITHUB_ENV"

      - name: Run test suite
        # run_tests.sh regenerates the script-class cache (--headless --editor --quit), runs the
        # GDScript unit tests, Python protocol/timeout/hide-seek tests, every headless integration
        # scene, the golden behavioral regressions, INT8 export + parity, and the Python helpers.
        run: ./test/run_tests.sh
