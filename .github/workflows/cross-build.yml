name: Cross-build

# Compile-only guard for the non-host GDExtension targets (Windows, Linux, Android, iOS).
# These rarely change, so this does NOT run on every PR — only when the build-affecting files
# change, or on manual dispatch. It proves each target still cross-compiles + links and uploads
# the binaries as artifacts; it does not run them (that needs real devices/emulators).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: &build_paths
      - "src/**"
      - "SConstruct"
      - "ncnn_runner.gdextension"
      - "scripts/cross/**"
      - ".github/workflows/cross-build.yml"
  pull_request:
    branches: [main]
    paths: *build_paths

concurrency:
  group: cross-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_CPP_BRANCH: "4.5"   # build against the minimum supported Godot; runs on newer too
  NCNN_TAG: "20260526"      # matches the main CI / locally-vendored ncnn
  NCNN_JOBS: "2"            # cap ncnn's AVX512-heavy compile to avoid OOM on the 16 GB runner

jobs:
  # Windows (zig) + Android (NDK), one target per matrix leg, on Linux runners. Linux is built
  # natively (linux job below) — the zig cross-compile produces a Linux .so that won't load.
  unix:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [windows, android-arm64, android-x86_64]
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3

      - name: Install zig
        if: matrix.target == 'windows'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Cross-build (${{ matrix.target }})
        run: |
          case "${{ matrix.target }}" in
            windows)
              scripts/cross/build_zig.sh windows ;;
            android-arm64)
              ANDROID_NDK_ROOT="$ANDROID_NDK_LATEST_HOME" scripts/cross/build_android.sh arm64 ;;
            android-x86_64)
              ANDROID_NDK_ROOT="$ANDROID_NDK_LATEST_HOME" scripts/cross/build_android.sh x86_64 ;;
          esac

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-${{ matrix.target }}
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # Linux — native GCC build (system libstdc++), the same way ci.yml builds + tests it. The zig
  # cross-compile leaves libc++ symbols undefined in the .so, so it loads-fails at runtime.
  linux:
    name: linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Build (native)
        run: scripts/cross/build_linux_native.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-linux
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # iOS device + simulator — needs the iOS SDK, so a macOS runner.
  ios:
    name: ios
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: brew install scons   # cmake + Xcode are preinstalled on the macOS runner

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Build iOS (device + simulator)
        run: scripts/cross/build_ios.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-ios
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # Web (WASM) — emscripten, single-threaded (NCNN_THREADS=OFF + scons threads=no). Compile-only;
  # the in-browser proof is manual (documented in docs/dev/building.md), since CI has no browser.
  web:
    name: web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Build web (wasm32)
        run: scripts/cross/build_web.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-web
          path: addons/godot_native_rl/bin/
          if-no-files-found: error
