name: Cross-build

# Cross-compile + runtime-validate the non-host GDExtension targets (Windows, Linux, Android, iOS).
# These rarely change, so this does NOT run on every PR — only when the build-affecting files
# change, or on manual dispatch. It proves each target still cross-compiles + links and uploads the
# binaries as artifacts; the `validate` job then runs the shared validate-binaries.yml reusable
# workflow (also used by release.yml) to prove each one actually loads / resolves its symbols:
#   - windows        : real Godot --headless smoke that ClassDB.instantiate("NcnnRunner")
#   - android-x86_64 : dlopen() the .so on a real Android x86_64 emulator against bionic
#   - android-arm64  : static link-time symbol audit via the NDK linker (can't emulate arm64 cheaply)
#   - ios            : static test-link of the .xcframework slices against the iOS SDK
# This is the #95 bug class (a binary that links but fails to *load*, e.g. zig's undefined libc++
# symbols on Linux) caught for every shipped target without needing a physical device.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: &build_paths
      - "src/**"
      - "SConstruct"
      - "ncnn_runner.gdextension"
      - "scripts/cross/**"
      - ".github/workflows/cross-build.yml"
  pull_request:
    branches: [main]
    paths: *build_paths

concurrency:
  group: cross-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_CPP_BRANCH: "4.5"   # build against the minimum supported Godot; runs on newer too
  NCNN_TAG: "20260526"      # matches the main CI / locally-vendored ncnn
  NCNN_JOBS: "2"            # cap ncnn's AVX512-heavy compile to avoid OOM on the 16 GB runner

jobs:
  # Windows (zig) + Android (NDK), one target per matrix leg, on Linux runners. Linux is built
  # natively (linux job below) — the zig cross-compile produces a Linux .so that won't load.
  unix:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [windows, android-arm64, android-x86_64]
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3

      - name: Install zig
        if: matrix.target == 'windows'
        # Still Node 20 (no Node 24 release upstream yet); GitHub auto-migrates it on 2026-06-16.
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Cross-build (${{ matrix.target }})
        run: |
          case "${{ matrix.target }}" in
            windows)
              scripts/cross/build_zig.sh windows ;;
            android-arm64)
              ANDROID_NDK_ROOT="$ANDROID_NDK_LATEST_HOME" scripts/cross/build_android.sh arm64 ;;
            android-x86_64)
              ANDROID_NDK_ROOT="$ANDROID_NDK_LATEST_HOME" scripts/cross/build_android.sh x86_64 ;;
          esac

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-${{ matrix.target }}
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # Linux — native GCC build (system libstdc++), the same way ci.yml builds + tests it. The zig
  # cross-compile leaves libc++ symbols undefined in the .so, so it loads-fails at runtime.
  linux:
    name: linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Build (native)
        run: scripts/cross/build_linux_native.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-linux
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # macOS host dylib + iOS slices, both on the macos-14 runner. The macOS host build is the only
  # PR-time check that the shipped dylib stays self-contained (#152) — build_macos.sh fails the
  # job if otool -L shows a non-system load path (e.g. a homebrew libomp.dylib).
  macos-ios:
    name: macos-ios
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: brew install scons   # cmake + Xcode are preinstalled on the macOS runner

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Build macOS host (arm64) + self-contained audit
        run: scripts/cross/build_macos.sh

      - name: Build iOS (device + simulator)
        run: scripts/cross/build_ios.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-ios
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # Web (WASM) — emscripten, single-threaded (NCNN_THREADS=OFF + scons threads=no). Compile-only;
  # the in-browser proof is manual (documented in docs/dev/building.md), since CI has no browser.
  web:
    name: web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3

      - name: Setup emscripten
        uses: emscripten-core/setup-emsdk@v16   # repo moved from mymindstorm/; v16 runs on Node 24
        with:
          version: 3.1.64

      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn

      - name: Build web (wasm32)
        run: scripts/cross/build_web.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-web
          path: addons/godot_native_rl/bin/
          if-no-files-found: error

  # Runtime/symbol validation of the freshly built binaries, via the shared reusable workflow
  # (release.yml calls the same one). Needs the build jobs that upload the artifacts it consumes.
  validate:
    needs: [unix, macos-ios]
    uses: ./.github/workflows/validate-binaries.yml
    with:
      windows_artifact: cross-windows
      android_x86_64_artifact: cross-android-x86_64
      android_arm64_artifact: cross-android-arm64
      ios_artifact: cross-ios
