name: Release

# Tag-triggered. Push vX.Y.Z to build all platforms (debug+release), assemble the addon +
# examples zips, smoke-test the packaged addon, and publish a GitHub Release. The addon zip's
# sha256 is printed in the release notes for the Asset Library Custom-download entry.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release

env:
  GODOT_CPP_BRANCH: "4.5"
  NCNN_TAG: "20260526"
  NCNN_JOBS: "2"
  ADDON_BIN: addons/godot_native_rl/bin

jobs:
  guard:
    name: Version guard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Assert tag matches plugin.cfg version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cfg="$(sed -n 's/^version="\(.*\)"/\1/p' addons/godot_native_rl/plugin.cfg)"
          echo "tag=$tag  plugin.cfg=$cfg"
          if [ "$tag" != "$cfg" ]; then
            echo "::error::tag v$tag does not match plugin.cfg version $cfg"; exit 1
          fi

  # Windows (zig) + Android (NDK) — one target per leg, on Linux runners. Linux is built
  # natively (build-linux job) — the zig cross-compile produces a Linux .so that fails to load.
  build-unix:
    name: build ${{ matrix.target }}
    needs: guard
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [windows, android-arm64, android-x86_64]
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3
      - name: Install zig
        if: matrix.target == 'windows'
        # Still Node 20 (no Node 24 release upstream yet); GitHub auto-migrates it on 2026-06-16.
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn
      - name: Build
        run: |
          case "${{ matrix.target }}" in
            windows) scripts/cross/build_zig.sh windows ;;
            android-arm64) ANDROID_NDK_ROOT="$ANDROID_NDK_LATEST_HOME" scripts/cross/build_android.sh arm64 ;;
            android-x86_64) ANDROID_NDK_ROOT="$ANDROID_NDK_LATEST_HOME" scripts/cross/build_android.sh x86_64 ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: ${{ env.ADDON_BIN }}/
          if-no-files-found: error

  # Linux — native GCC build (system toolchain + libstdc++). The zig cross-compile leaves libc++
  # symbols undefined in the .so (fails to load at runtime); native avoids it. Same toolchain
  # ci.yml builds + tests with, so it's proven to load.
  build-linux:
    name: build linux
    needs: guard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3
      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn
      - name: Build (native)
        run: scripts/cross/build_linux_native.sh
      - uses: actions/upload-artifact@v7
        with:
          name: bin-linux
          path: ${{ env.ADDON_BIN }}/
          if-no-files-found: error

  # macOS host (arm64) + iOS device/simulator — needs Xcode, so a macOS runner.
  build-macos:
    name: build macos+ios
    needs: guard
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install scons
        run: brew install scons
      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn
      - name: Build ncnn static lib (macOS arm64)
        # scons links a prebuilt static ncnn; the cross scripts build their own, but the macOS
        # host path needs it built explicitly. Produces thirdparty/ncnn/build/install/lib/libncnn.a
        # (the generic host path SConstruct looks for). NEON only on Apple Silicon, so full
        # parallelism is safe (no AVX512 OOM like the 16 GB Linux runners).
        run: |
          cmake -S thirdparty/ncnn -B thirdparty/ncnn/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNCNN_BUILD_TOOLS=OFF -DNCNN_BUILD_EXAMPLES=OFF \
            -DNCNN_BUILD_BENCHMARK=OFF -DNCNN_BUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build thirdparty/ncnn/build --config Release --parallel "$(sysctl -n hw.ncpu)"
          cmake --install thirdparty/ncnn/build --prefix thirdparty/ncnn/build/install
      - name: Build macOS host (arm64, debug+release)
        run: |
          scons platform=macos arch=arm64 target=template_debug -j"$(sysctl -n hw.ncpu)"
          scons platform=macos arch=arm64 target=template_release -j"$(sysctl -n hw.ncpu)"
      - name: Build iOS (device + simulator)
        run: scripts/cross/build_ios.sh
      - uses: actions/upload-artifact@v7
        with:
          name: bin-macos-ios
          path: ${{ env.ADDON_BIN }}/
          if-no-files-found: error

  # Web (WASM) — emscripten, single-threaded (NCNN_THREADS=OFF + scons threads=no). Built here so
  # the release zips ship the .wasm too. Runtime-proven separately (docs/dev/building.md).
  build-web:
    name: build web
    needs: guard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons cmake git python3
      - name: Setup emscripten
        uses: emscripten-core/setup-emsdk@v16   # repo moved from mymindstorm/; v16 runs on Node 24
        with:
          version: 3.1.64
      - name: Clone godot-cpp + ncnn
        run: |
          git clone -b "${GODOT_CPP_BRANCH}" --depth 1 https://github.com/godotengine/godot-cpp.git
          mkdir -p thirdparty
          git clone -b "${NCNN_TAG}" --depth 1 https://github.com/Tencent/ncnn.git thirdparty/ncnn
      - name: Build web (wasm32)
        run: scripts/cross/build_web.sh
      - uses: actions/upload-artifact@v7
        with:
          name: bin-web
          path: ${{ env.ADDON_BIN }}/
          if-no-files-found: error

  # Gate the release on runtime/symbol validation of the just-built binaries (same reusable workflow
  # cross-build.yml uses at PR time): Windows --headless load, Android x86_64 emulator dlopen, Android
  # arm64 link audit, iOS SDK test-link. A binary that links but fails to *load* (#95) blocks publish.
  validate:
    needs: [build-unix, build-macos]
    uses: ./.github/workflows/validate-binaries.yml
    with:
      windows_artifact: bin-windows
      android_x86_64_artifact: bin-android-x86_64
      android_arm64_artifact: bin-android-arm64
      ios_artifact: bin-macos-ios

  package:
    name: package + publish
    needs: [build-unix, build-linux, build-macos, build-web, validate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Collect all platform binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          merge-multiple: true
          path: ${{ env.ADDON_BIN }}
      - name: Sanity-check the binary set
        run: |
          ls -la "$ADDON_BIN"
          for f in \
            libncnn_runner.macos.template_release.arm64.dylib \
            libncnn_runner.windows.template_release.x86_64.dll \
            libncnn_runner.linux.template_release.x86_64.so \
            libncnn_runner.android.template_release.arm64.so \
            libncnn_runner.android.template_release.x86_64.so \
            libncnn_runner.ios.template_release.xcframework \
            libncnn_runner.web.template_release.wasm32.nothreads.wasm ; do
            test -e "$ADDON_BIN/$f" || { echo "::error::missing $f"; exit 1; }
          done
      - name: Assemble zips
        run: |
          ver="${GITHUB_REF_NAME}"
          mkdir -p dist
          # Addon zip: the whole addon (GDScript + .gdextension + bin/), drop-in at a project root.
          zip -r -q "dist/godot-native-rl-addon-${ver}.zip" addons/godot_native_rl
          # Examples zip: lean — example scenes + a sample model + a short README. No binaries.
          cp .github/release/examples-README.md examples/README_RELEASE.md
          zip -r -q "dist/godot-native-rl-examples-${ver}.zip" examples models/chase_cleanrl_policy.ncnn.param models/chase_cleanrl_policy.ncnn.bin examples/README_RELEASE.md \
            -x 'examples/**/*.import'
          ( cd dist && sha256sum ./*.zip > SHA256SUMS.txt )
          cat dist/SHA256SUMS.txt
      - name: Drop-in smoke (extract addon zip into a clean project, load NcnnRunner)
        run: |
          GODOT_URL="https://github.com/godotengine/godot/releases/download/4.5.2-stable/Godot_v4.5.2-stable_linux.x86_64.zip"
          curl -fsSL "$GODOT_URL" -o godot.zip
          unzip -q godot.zip
          godot_bin="$(ls Godot_v4.5.2-stable_linux.x86_64)"
          chmod +x "$godot_bin"
          mkdir -p smoke/proj
          ( cd smoke/proj && unzip -q "$GITHUB_WORKSPACE/dist/godot-native-rl-addon-${GITHUB_REF_NAME}.zip" )
          printf '%s\n' 'config_version=5' '[application]' 'config/features=PackedStringArray("4.5")' '[debug]' 'gdscript/warnings/enable=false' > smoke/proj/project.godot
          cat > smoke/proj/smoke.gd <<'EOF'
          extends SceneTree
          func _init() -> void:
              var r = ClassDB.instantiate("NcnnRunner")
              if r == null:
                  push_error("NcnnRunner not registered — extension failed to load")
                  quit(1)
              else:
                  print("OK: NcnnRunner loaded from packaged addon")
                  quit(0)
          EOF
          # GDExtensions only load from .godot/extension_list.cfg, which an editor import pass
          # generates — without it a fresh --script run never registers NcnnRunner.
          "$GITHUB_WORKSPACE/$godot_bin" --headless --path smoke/proj --editor --quit || true
          "$GITHUB_WORKSPACE/$godot_bin" --headless --path smoke/proj --script res://smoke.gd
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME}"
          notes="$(mktemp)"
          {
            echo "## Install"
            echo "- **Asset Library:** search \"Godot Native RL\" in the editor's AssetLib tab."
            echo "- **Manual:** download \`godot-native-rl-addon-${ver}.zip\` and unzip at your project root."
            echo "- Examples: also grab \`godot-native-rl-examples-${ver}.zip\` (needs the addon zip too)."
            echo
            echo "### addon zip sha256 (for the Asset Library Custom download)"
            echo '```'
            grep 'addon' dist/SHA256SUMS.txt
            echo '```'
          } > "$notes"
          gh release create "$ver" \
            dist/godot-native-rl-addon-${ver}.zip \
            dist/godot-native-rl-examples-${ver}.zip \
            dist/SHA256SUMS.txt \
            --title "$ver" \
            --notes-file "$notes" \
            --generate-notes
